<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page - Agri Aura</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Order Page - Agri Aura</h1>
    </header>
    <main>
        <div class="order-container">
            <h2 id="product-name">Product Name</h2>
            <img id="product-image" src="" alt="Product Image">
            <p>Amount: <span id="product-amount">$0</span></p>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" value="1" min="1" max="100">

            <!-- Booking Options -->
            <h3>Booking Options</h3>
            <input type="radio" id="normal" name="booking" value="normal" checked>
            <label for="normal">Normal Booking</label><br>
            <input type="radio" id="prebook" name="booking" value="prebook">
            <label for="prebook">Pre-booking</label><br>

            <!-- Address Form -->
            <h3>Delivery Address</h3>
            <form id="address-form">
                <label for="name">Name:</label>
                <input type="text" id="name" required><br>
                <label for="address">Address:</label>
                <textarea id="address" rows="4" required></textarea><br>
                <label for="contact">Contact Number:</label>
                <input type="text" id="contact" required><br>
                <button type="button" onclick="placeOrder()">Place Order</button>
            </form>
        </div>
    </main>

                    productImage = '';

            document.getElementById('product-image').src = productImage;
            document.getElementById('product-amount').innerText = productAmount;
        }

        // Update product details on page load
        updateProductDetails();

        // Function to place the order
        function placeOrder() {
            const quantity = document.getElementById('quantity').value;
            const bookingType = document.querySelector('input[name="booking"]:checked').value;
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const contact = document.getElementById('contact').value;

            if (!name || !address || !contact) {
                alert("Please fill in all the required fields.");
                return;
            }

            // Simulate placing the order (in a real application, you'd send this data to the server)
            alert(`Order Placed Successfully!\n\nProduct: ${productName}\nQuantity: ${quantity}\nBooking: ${bookingType}\nName: ${name}\nAddress: ${address}\nContact: ${contact}`);

            // Reset form after submission
            document.getElementById('address-form').reset();
        }
    </script>
</body>
</html>
